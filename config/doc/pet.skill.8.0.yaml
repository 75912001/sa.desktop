# 宠物技能完整配置
# 数据源: F:/最终版本-game/石器时代-解压缩使用版/石器时代8.0[失落的世界]服务端+客户端密码6664710258/csa_8.0/gmsv/data/petskill2.txt
# 源文件编码: GB18030; 本文件编码: UTF-8.
# setup.cf 当前源码口径: petskillfile2=./data/petskill2.txt.
# 字段说明:
#   source_line: 源 petskill2.txt 行号.
#   name: 技能名称.
#   description: 技能说明.
#   function: 服务端执行函数名, 对应 gmsv/battle/pet_skill.c 的 PETSKILL_functbl.
#   option: 技能函数参数原文.
#   free: _CFREE_petskill 扩展字段原文.
#   kind_code: _CFREE_petskill 技能种类编码原文.
#   id: 宠物技能 ID, 宠物配置 skill1..skill7 引用这个值.
#   field: 使用场景枚举, 0=all, 1=battle, 2=map.
#   field_name: field 的可读名称.
#   target: 目标类型枚举, 0=myself, 1=other, 2=all_my_side, 3=all_other_side, 4=all, 5=none, 6=other_without_myself, 7=without_myself_and_pet, 其他值保留为 unknown_N.
#   target_name: target 的可读名称.
#   use_type: _PETSKILL2_TXT 使用类型 bitmask, 1=none, 2=battle.
#   use_type_flags: use_type 拆解后的标记列表.
#   cost: 学习或使用相关费用字段; 源文件为空时输出 null.
#   code: petskill2.txt 第 12 列原文, 不改写成 PETSKILL_ILLEGAL 派生值.
# 重复 ID 处理:
#   本文件完整保留全部源行, 不按 id 去重.
#   重复 ID: 1068, 1098, 1099, 1100, 1101, 1102, 1178.
#   服务端开启 _PETSKILL_OPTIMUM 时, 相同 ID 的后出现记录会覆盖前出现记录的数组槽位; 本文件仍保留源文件顺序供复查.

