# 敌人组配置
# 任何修改此文件的行为都需要通知客户端和服务端开发人员

# 关于出现的位置
## 在回合制战斗中,位置规则:
### 0:一排中间, 1:一排中间左手, 2:一排中间右手, 3:一排最左边, 4:一排最右边, 5:二排中间, 6:二排中间左手, 7:二排中间右手, 8:二排最左边, 9:二排最右边
### 先从必须出的怪物(weight=0)开始,按照配置顺序
### 然后从剩余位置中,按照权重随机选择

# isBoss: true/false 是否是Boss组[默认false]
## 如果是 boss 组, 那么按照固定顺序,将怪物放置到指定位置.
## 出现的怪物, 必须全部配置在enemies中, countRange 无效
## 必须指定等级(enemies[].level), levelRange/roleLevelOffset 无效
## captured 无效(不可捕获)
## babyRate 无效(不可出现宝宝)
## weight 无效

# countRange: [2, 5]              # 敌人数量范围, [1, 10] 之内
# levelRange: [最小等级, 最大等级] # 敌人等级范围, [1, 140] 之内
# roleLevelOffset: [最小偏移, 最大偏移] # 角色等级偏移
# captured: true/false 是否允许捕获 [默认:true]
# babyRate: [0, 100000] 每只敌人成为宠物宝宝(1级)的概率(十万分率) [默认:0]
# enemies[].id: 引用 pet.yaml 中的宠物ID (作为敌人模板)
# enemies[].weight: 权重(加权池), 用于随机选择敌人 [默认:0]:0:必定出现
# enemies[].level: 指定敌人等级 [1, 140] 之内

enemyGroups:
  - id: 1
    name: 利則諾頓巡逻队
    countRange: [1, 5]
    levelRange: [1, 5]
    captured: true
    babyRate: 50000
    enemies:
      - id: 4000001
      - id: 4000001
        weight: 100

  - id: 2
    name: 揚奇洛斯精锐
    countRange: [3, 6]
    roleLevelOffset: [-1, 2]
    captured: true
    babyRate: 50000
    enemies:
      - id: 4000002
        weight: 50
      - id: 4000002
        weight: 50

  - id: 3
    name: 邦浦洛斯守护者
    isBoss: true
    enemies:
      - id: 4000003
        level: 10

  - id: 4
    name: 邦奇諾长老会
    isBoss: true
    enemies:
      - id: 4000004
        level: 15
      - id: 4000004
        level: 12
      - id: 4000004
        level: 12
