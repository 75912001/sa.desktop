############################################################
# growth 字段说明:
#   pet_name: [配置] 宠物名称, 来自 enemybase1.txt.
#   init_num: [配置] 初始系数, 参与初始四维计算.
#   lvup_point_source: [配置] 原始升级成长点字段文本, 例如 4.50.
#   base_vital: [配置] 宠物模板固定基础体力值
#   base_str: [配置] 宠物模板固定基础腕力/攻击值
#   base_tough: [配置] 宠物模板固定基础耐力/防御值
#   base_dex: [配置] 宠物模板固定基础速度/敏捷值
#   earth: [配置] 地属性比例
#   water: [配置] 水属性比例
#   fire: [配置] 火属性比例
#   wind: [配置] 风属性比例
#   skill1: [配置] 初始宠物技能 1
#   skill2: [配置] 初始宠物技能 2
#   skill3: [配置] 初始宠物技能 3
#   skill4: [配置] 初始宠物技能 4
#   skill5: [配置] 初始宠物技能 5
#   skill6: [配置] 初始宠物技能 6
#   skill7: [配置] 初始宠物技能 7
############################################################
# 1 级宠物生成伪代码:
# 计算等级系数:
#   factor = init_num + (level - 1) * atoi(lvup_point_source)
#
# 宠物个体自己的成长基础四维:
#   saved_base_vital = base_vital + random(-2, -1, 0, 1, 2)
#   saved_base_str = base_str + random(-2, -1, 0, 1, 2)
#   saved_base_tough = base_tough + random(-2, -1, 0, 1, 2)
#   saved_base_dex = base_dex + random(-2, -1, 0, 1, 2)

# 再随机分配 10 点到四维, 只影响初始 raw 属性:
#   final_base_vital = saved_base_vital
#   final_base_str = saved_base_str
#   final_base_tough = saved_base_tough
#   final_base_dex = saved_base_dex
#   repeat 10 times:
#       target = random(vital, str, tough, dex)
#       if target == vital: final_base_vital += 1
#       if target == str: final_base_str += 1
#       if target == tough: final_base_tough += 1
#       if target == dex: final_base_dex += 1
#
# 计算初始 raw 四维:
#   raw_vital = factor * final_base_vital
#   raw_str = factor * final_base_str
#   raw_tough = factor * final_base_tough
#   raw_dex = factor * final_base_dex
#
# 生成真实宠物实例时, 运行方必须保存实例字段:
#   saved_base_vital
#   saved_base_str
#   saved_base_tough
#   saved_base_dex
#   初始 raw 四维
#       raw_vital, raw_str, raw_tough, raw_dex

# 面板换算公式:
# [推导] HP = int((raw_vital * 4 + raw_str + raw_tough + raw_dex) * 0.01)
# [推导] attack = int(raw_str * 0.01 + raw_tough * 0.001 + raw_vital * 0.001 + raw_dex * 0.0005)
# [推导] defense = int(raw_tough * 0.01 + raw_str * 0.001 + raw_vital * 0.001 + raw_dex * 0.0005)
# [推导] agility = int(raw_dex * 0.01)
############################################################
# 宠物升级伪代码:
# rank 的来源, 发生在生成宠物时:
#   base_sum = base_vital + base_str + base_tough + base_dex
#   if base_sum >= 100: rank = 0
#   elif base_sum >= 95: rank = 1
#   elif base_sum >= 90: rank = 2
#   elif base_sum >= 85: rank = 3
#   elif base_sum >= 80: rank = 4
#   else: rank = 5
#
# 生成本次升级随机点:
#   add_vital = 0
#   add_str = 0
#   add_tough = 0
#   add_dex = 0
#   repeat 10 times:
#       target = random(vital, str, tough, dex)
#       if target == vital: add_vital += 1
#       if target == str: add_str += 1
#       if target == tough: add_tough += 1
#       if target == dex: add_dex += 1
#
# 根据 rank 选择成长系数范围:
#   rank_ranges = {
#       0: [4.50, 5.00],
#       1: [4.70, 5.20],
#       2: [4.90, 5.40],
#       3: [5.10, 5.60],
#       4: [5.30, 5.80],
#       5: [5.50, 6.00],
#   }
#   rank_rand = random(rank_ranges[rank].min, rank_ranges[rank].max)
#
# 写回升级后的 raw 四维:
#   raw_vital += int((saved_base_vital + add_vital) * rank_rand)
#   raw_str += int((saved_base_str + add_str) * rank_rand)
#   raw_tough += int((saved_base_tough + add_tough) * rank_rand)
#   raw_dex += int((saved_base_dex + add_dex) * rank_rand)
#
# 最后重新执行面板换算公式, 得到新的 HP/攻击/防御/敏捷.
#



