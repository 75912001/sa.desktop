# 托盘菜单-配置
# 任何修改此文件的行为都需要通知客户端和服务端开发人员

window:
  # 主窗口左上角屏幕坐标.
  # 拖拽或重置窗口位置后会自动写回.
  position:
    x: 1470
    y: 640
  # 内容缩放比例, 0.1 表示 10%, 1.0 表示 100%; 用户通过托盘缩放滑动条调整后会写回.
  scale: 1.0
  # 内容透明度, 0.1 表示 10%, 1.0 表示 100%; 用户通过托盘透明度滑动条调整后会写回.
  opacity: 1.0
  # 是否启用鼠标穿透; 用户通过托盘勾选后会写回.
  click_through: false
  # 启动时是否默认隐藏主窗口.
  # true 表示程序启动后只保留托盘入口, 主窗口会最小化隐藏.
  # 用户点击托盘 显示/隐藏窗口 后会把当前选择写回此配置项.
  hidden: true
  # 调试用红色边框开关.
  # true 表示启动时默认显示 2px 红边, 用来确认透明主窗口的实际范围.
  # 用户也可以在 托盘 -> 选项... -> 系统 中勾选或取消, 该操作会直接修改此配置项.
  debug_border: true

menu:
  # 菜单文字字号. 菜单宽度和高度会按字号和文本内容自动计算.
  font_size: 18
  # 菜单颜色使用 #RRGGBB 或 #RRGGBBAA. AA 为透明度, FF 表示完全不透明.
  colors:
    # 菜单面板背景色.
    panel: "#FAFAFA"
    # 菜单窗口边框颜色.
    border: "#858F9FFF"
    # 普通菜单项文字颜色.
    text: "#0D0F14FF"
    # 鼠标悬浮或保持高亮时的文字颜色.
    hover_text: "#FFFFFFFF"
    # 鼠标悬浮或子菜单入口保持高亮时的背景色.
    highlight: "#1A61D1FF"
    # 菜单项按下时的背景色.
    pressed: "#1247A3FF"
    # 禁用菜单项文字颜色.
    disabled_text: "#949BA8FF"
